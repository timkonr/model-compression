# Evaluate KD-trained CoNeTTE student on Clotho.
# Run with: mc-run --config experiments/eval_kd_clotho.yaml
#
# Pruning params MUST match those used in kd_example.yaml during training,
# so that prune_conette() reconstructs the exact same architecture before
# loading the saved state dict.

model: conette
dataset: clotho
seed: 42

technique: kd

kd:
  model_path: checkpoints/kd_conette_clotho_pure_kd/best

metrics: [spider, fense, meteor]
inference: true
evaluation: true
save_inference_results: true
data_folder: data/
model_folder: model/
