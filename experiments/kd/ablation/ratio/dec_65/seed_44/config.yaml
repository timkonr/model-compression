# Pruning-Ratio-Ablation — decoder-only @ 65 %, seed 44.
# Konfirmatorisches Experiment (Better-than-Baseline-Frage): enc_30 (+0.8 %) und dec_65
# (+0.7 %, hoechstes Test-FENSE 0.5215) lagen im Seed-42-Screening nominal UEBER Baseline.
# Diese Zellen wurden POST-HOC ausgewaehlt, weil sie hoch lagen (Winner's-Curse-Risiko!)
# — daher vorab festgelegtes Kriterium: 3-Seed-Mittel > Baseline um mehr als 2x Seed-Std
# UND konsistentes Vorzeichen auf FENSE, sonst gilt der Effekt als Rauschen.
# Config-identisch zu dec_65/seed_42, nur der Seed variiert.
# Fixiert aus Todo #3: pure_kd, LR 5e-4, 20 Epochen, Val-FENSE-Selektion.
# Run: mc-train-kd --config experiments/kd/ablation/ratio/dec_65/seed_44/config.yaml

model: conette
dataset: clotho
seed: 44

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: null
  decoder_pruning_ratio: 0.65
  convnext_3072_threshold: null
  convnext_1536_threshold: null

kd:
  mode: pure_kd
  train_components: decoder
  alpha: 0.0
  lr: 5e-4  # Gewinner decoder_kd_lr-Sweep (getunt @80 %)
  lr_encoder: 1.0e-6  # unused (encoder frozen)
  num_epochs: 20
  batch_size: 8
  grad_accum_steps: 64
  patience: 999  # early stopping disabled for clean full-length runs
  warmup_epochs: 2
  save_dir: experiments/kd/ablation/ratio/dec_65/seed_44

data_folder: data/
model_folder: model/
