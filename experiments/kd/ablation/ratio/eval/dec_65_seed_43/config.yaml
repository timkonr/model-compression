# Finale Test-Evaluation (SPIDEr/FENSE/METEOR auf Clotho-eval) — Konfirmation der Better-than-Baseline-Kandidaten (Kriterium siehe Trainings-Config).
# Checkpoint: experiments/kd/ablation/ratio/dec_65/seed_43/best
# (Architektur wird aus run_config.json neben best/ rekonstruiert — kein Wanda-Rerun.)
# Run: python src/evaluate.py --config experiments/kd/ablation/ratio/eval/dec_65_seed_43/config.yaml

model: conette
dataset: clotho
seed: 43

technique: kd

kd:
  model_path: experiments/kd/ablation/ratio/dec_65/seed_43/best

metrics: [spider, fense, meteor]
inference: true
evaluation: true
save_inference_results: true
data_folder: data/
model_folder: model/
