# Pruned-only-Evaluation (audiocaps-Test) — AudioCaps-KALIBRIERTER Student, enc_60, seed 42.
# Gegenstueck zu eval_pruned/enc_60_audiocaps_seed_42 (Clotho-kalibriert). 2x2-Vergleich
# Kalibrierung (clotho/audiocaps) x Test-Set (clotho/audiocaps) prueft die
# Kalibrierungs-Hypothese: der Schaden folgt den Kalibrierungsdaten.
# Checkpoint: experiments/kd/ablation/cross_domain/pruned_only_ac_calib/enc_60/seed_42/best
# Run: python src/run_all.py --config experiments/kd/ablation/cross_domain/eval_pruned_ac_calib/enc_60_audiocaps_seed_42/config.yaml

model: conette
dataset: audiocaps
seed: 42

technique: kd

kd:
  model_path: experiments/kd/ablation/cross_domain/pruned_only_ac_calib/enc_60/seed_42/best

metrics: [spider, fense, meteor]
inference: true
evaluation: true
save_inference_results: true
data_folder: data/
model_folder: model/
