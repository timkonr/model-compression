# Pruned-only-Evaluation (audiocaps-Test) — AudioCaps-KALIBRIERTER Student, enc_60, seed 42.
# Gegenstueck zu eval_pruned/ (Clotho-kalibriert): 2x2 Kalibrierung x Test-Set prueft die Kalibrierungs-Hypothese (der Schaden folgt den Kalibrierungsdaten).
# technique: pruning -> evaluate.py prunt selbst (deterministisch: Calib-Samples werden
# unshuffled gezogen; gleiche Kalibrierung => identischer Student ueber beide Test-Sets).
# Kalibrierungspool: AudioCaps-val (~495 Clips) — nie das Test-Set (kein Leakage). AudioCaps-train ist am
# Pod nicht verfuegbar; val ersetzt es (Abweichung in der MA dokumentieren).
# Run: python src/run_all.py --config experiments/kd/ablation/cross_domain/eval_pruned_ac_calib/enc_60_audiocaps_seed_42/config.yaml

model: conette
dataset: audiocaps
seed: 42

technique: pruning

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  calibration_dataset: audiocaps
  global_pruning_ratio: 0.6
  decoder_pruning_ratio: null
  convnext_3072_threshold: null
  convnext_1536_threshold: null

metrics: [spider, fense, meteor]
inference: true
evaluation: true
save_inference_results: true
data_folder: data/
model_folder: model/
