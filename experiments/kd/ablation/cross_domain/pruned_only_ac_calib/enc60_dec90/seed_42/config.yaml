# Pruned-only mit AUDIOCAPS-Kalibrierung (Kalibrierungs-Hypothese) — enc60_dec90, seed 42,
# KEIN Training (num_epochs=0). Spiegelexperiment zu pruned_only/enc60_dec90 (dort Clotho-
# kalibriert): gleiche Ratios, gleicher Code-Pfad, nur die Kalibrierungsdaten wechseln
# (dataset: audiocaps -> Wanda-Scores aus AudioCaps-train-Aktivierungen).
# Hypothese: das Schadensmuster spiegelt sich (AudioCaps mild, Clotho bricht ein) ->
# die Kalibrierungsdaten bestimmen, welche Domaene das Pruning ueberlebt — nicht
# Architektur oder Ratio. Der Epoch-(-1)-Eval laeuft hier auf AudioCaps-val.
# Run: python src/kd/kd_train.py --config experiments/kd/ablation/cross_domain/pruned_only_ac_calib/enc60_dec90/seed_42/config.yaml

model: conette
dataset: audiocaps
seed: 42

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: 0.6
  decoder_pruning_ratio: 0.9
  convnext_3072_threshold: null
  convnext_1536_threshold: null

kd:
  mode: pure_kd
  train_components: all
  alpha: 0.0
  lr: 5e-4
  lr_encoder: 5e-4
  num_epochs: 0  # prune-only: kein Training, best/ = initialer geprunter Student
  batch_size: 8
  grad_accum_steps: 64
  patience: 999
  warmup_epochs: 2
  save_dir: experiments/kd/ablation/cross_domain/pruned_only_ac_calib/enc60_dec90/seed_42

data_folder: data/
model_folder: model/
