# Kombi-Ablation (Todo #4, Stufe 3) — encoder@70 % + decoder@90 % kombiniert geprunt,
# Distill-Ziel: all (beide Komponenten, getrennte LR-Gruppen), seed 42.
# Aggressiver Kombi-Punkt jenseits des Encoder-Knies (Screening, seed 42): prueft, ob der
# enc_70-Abfall (-0.004 vs. enc_60, 3-Seed-bestaetigt) sich in der Kombi fortsetzt oder verstaerkt.
# Distill-Ziel 'all' direkt uebernommen vom enc60_dec90-Screening (klarer Gewinner).
# Fixiert aus Todo #3: pure_kd, LR je Komponente 5e-4 (Sweep-Gewinner, LR-Transfer-Annahme
# wie in der Ratio-Ablation dokumentiert), 20 Epochen, Val-FENSE-Selektion.
# Run: mc-train-kd --config experiments/kd/ablation/combo/enc70_dec90/target_all/seed_42/config.yaml
model: conette
dataset: clotho
seed: 42

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: 0.7
  decoder_pruning_ratio: 0.9
  convnext_3072_threshold: null
  convnext_1536_threshold: null

kd:
  mode: pure_kd
  train_components: all
  alpha: 0.0
  lr: 5e-4  # Gewinner decoder_kd_lr-Sweep
  lr_encoder: 5e-4  # Gewinner encoder_kd_lr-Sweep
  num_epochs: 20
  batch_size: 8
  grad_accum_steps: 64
  patience: 999  # early stopping disabled for clean full-length runs
  warmup_epochs: 2
  save_dir: experiments/kd/ablation/combo/enc70_dec90/target_all/seed_42

data_folder: data/
model_folder: model/
