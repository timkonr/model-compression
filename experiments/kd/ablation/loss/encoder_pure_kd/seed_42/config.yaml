# >>> NICHT AUSFUEHREN <<<
# Das Seed-42-Ergebnis dieser Zelle ist der config-identische Sweep-Lauf:
#   experiments/kd/sweep/encoder_kd_lr/lr_5e-4
# (gleicher Seed, gleiches Budget, gleiche HPs — ein Rerun unter identischen
# Bedingungen liefert nichts Neues). Diese Datei dokumentiert nur die Zelle im
# 2x3x3-Design; die Auswertung liest training_log.jsonl aus dem Sweep-Pfad.
# KLD-vs-CE Loss-Ablation (Todo #3, Phase B) — encoder-only 60%, pure KD (Minitron BP #5, alpha=0), seed 42.
# Achse: Loss (mode/alpha) x Komponente (decoder@80% / encoder@60%) x 3 Seeds,
# jeder Loss an seiner EIGENEN Gewinner-LR aus den Phase-A-Sweeps (faire Vergleiche).
# WICHTIG: Vergleich der Losses NUR auf Val-FENSE der Best-Checkpoints (SPIDEr einmalig
# auf Test erst nach der Loss-Entscheidung) — NICHT auf val_loss (andere Zielfunktionen).
# Gleicher Seed = identisch geprunter Student -> Loss-Vergleiche innerhalb eines Seeds
# sind GEPAART; paarweise Differenzen pro Seed berichten, nicht nur mean+-std.
# patience=999: volle Laenge statt Early Stopping — FENSE-Best-Checkpoint-Auswahl deckt 'bis Konvergenz' ab.
# Run: mc-train-kd --config experiments/kd/ablation/loss/encoder_pure_kd/seed_42/config.yaml

model: conette
dataset: clotho
seed: 42

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: 0.6
  decoder_pruning_ratio: null
  convnext_3072_threshold: null
  convnext_1536_threshold: null

kd:
  mode: pure_kd
  train_components: encoder
  alpha: 0.0
  lr: 1.0e-4  # unused (decoder frozen)
  lr_encoder: 5e-4  # encoder_kd_lr-Sweep: klarer innerer Peak (0.5105), beidseitig eingerahmt (1e-4: 0.5055 / 1e-3: 0.5099 / 5e-3: 0.5055)
  num_epochs: 20
  batch_size: 8
  grad_accum_steps: 64
  patience: 999  # volle 20 Epochen: beobachtete FENSE-Rauschluecken bis 6 Epochen zwischen is_best-Events (decoder_ce 1e-3) machen patience=5 riskant; einheitliches Budget vermeidet Selektionsbias zwischen glatten (KD) und verrauschten (CE) Laeufen
  warmup_epochs: 2
  save_dir: experiments/kd/ablation/loss/encoder_pure_kd/seed_42

data_folder: data/
model_folder: model/
