# Decoder-only pruning (50%) + pure KD recovery, decoder-only training
# Original CoNeTTE hyperparameters: lr=5e-4, weight_decay=2.0, grad_clip=10, cosine per epoch
# Training:    mc-train-kd --config experiments/kd/conette/dec_pruned_clotho_pure_kd_orig/config.yaml
# Evaluation:  mc-run      --config experiments/kd/conette/dec_pruned_clotho_pure_kd_orig/config.yaml

model: conette
dataset: clotho
seed: 42

technique: kd

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: null
  decoder_pruning_ratio: 0.5
  convnext_3072_threshold: null
  convnext_1536_threshold: null

kd:
  mode: pure_kd
  train_components: decoder
  alpha: 0.0
  lr: 5.0e-4
  lr_encoder: 1.0e-7
  weight_decay: 2.0
  grad_clip_norm: 10.0
  num_epochs: 15
  batch_size: 4
  grad_accum_steps: 4
  patience: 5
  model_path: experiments/kd/conette/dec_pruned_clotho_pure_kd_orig/best

metrics: [spider, fense, meteor]
inference: true
evaluation: true
save_inference_results: true
data_folder: data/
model_folder: model/
