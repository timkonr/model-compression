# Decoder-only pruning (50%) + pure KD recovery, encoder frozen
# Training:    mc-train-kd --config experiments/kd/conette/dec_pruned_clotho_pure_kd_dec/config.yaml
# Evaluation:  mc-run      --config experiments/kd/conette/dec_pruned_clotho_pure_kd_dec/config.yaml

model: conette
dataset: clotho
seed: 42

technique: kd

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: 0.5
  decoder_pruning_ratio: null
  convnext_3072_threshold: null
  convnext_1536_threshold: null

kd:
  mode: pure_kd
  train_components: encoder
  alpha: 0.0
  lr: 1.0e-5
  lr_encoder: 1.0e-5
  num_epochs: 10
  batch_size: 4
  grad_accum_steps: 4
  patience: 5
  model_path: experiments/kd/conette/enc50_clotho/best

metrics: [spider, fense, meteor]
inference: true
evaluation: true
save_inference_results: true
data_folder: data/
model_folder: model/
