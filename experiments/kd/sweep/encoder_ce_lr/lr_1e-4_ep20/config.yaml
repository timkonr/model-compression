# LR sweep (encoder-only 60%, mode=encoder_ce) — Experiment_Redo_TODO.md #2/#3, Phase A.
# Grenzfall-Check: 1e-4 wurde beim 10-Epochen-Screening ausgeschieden (best 0.4934, Peak ep5, danach flach), lag aber nur ~0.01 hinter den Finalisten. Da der Cosine-Schedule von num_epochs abhaengt (20-Ep-Lauf = anderer LR-Verlauf, nicht nur laenger), wird der staerkste ausgeschiedene Kandidat einmal auf dem finalen 20-Ep-Budget nachgezogen, damit die Endauswahl vollstaendig bei gleichem Budget verglichen ist.
# WICHTIG: Sweep-Vergleich auf bestem Val-FENSE, nie auf val_loss und nie auf test.
# num_epochs=20 fix (identischer Cosine-Schedule wie alle anderen Phase-A-Sweeps).
# Run: mc-train-kd --config experiments/kd/sweep/encoder_ce_lr/lr_1e-4_ep20/config.yaml

model: conette
dataset: clotho
seed: 42

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: 0.6
  decoder_pruning_ratio: null
  convnext_3072_threshold: null
  convnext_1536_threshold: null

kd:
  mode: encoder_ce
  train_components: encoder
  lr: 1.0e-4  # unused (decoder frozen)
  lr_encoder: 1e-4
  num_epochs: 20
  batch_size: 8
  grad_accum_steps: 64
  patience: 999  # early stopping disabled for clean full-length runs
  warmup_epochs: 2
  save_dir: experiments/kd/sweep/encoder_ce_lr/lr_1e-4_ep20

data_folder: data/
model_folder: model/
