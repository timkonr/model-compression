# LR sweep (encoder-only target) — Experiment_Redo_TODO.md #2/#3.
# Representative config: encoder-pruned 50% (global_pruning_ratio), train_components=encoder,
# decoder frozen. Short truncated run (num_epochs=5, patience=3) to compare val_loss trend
# across the grid [1e-7, 5e-7, 1e-6, 5e-6, 1e-5] on held-out val — NEVER on test/eval.
# Lower/wider grid than the decoder sweep: supervisor diagnosed catastrophic forgetting
# from too-high LR on the AudioSet-pretrained ConvNeXt encoder (Pellegrini et al., 2023)
# as the cause of earlier encoder-recovery failures. Winner gets frozen as `lr_encoder`
# for all encoder-only recovery runs across pruning ratios.
# Run: mc-train-kd --config experiments/kd/sweep/encoder_lr/lr_1e-6/config.yaml

model: conette
dataset: clotho
seed: 42

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: 0.5
  decoder_pruning_ratio: null
  convnext_3072_threshold: null
  convnext_1536_threshold: null

kd:
  mode: pure_kd
  train_components: encoder
  alpha: 0.0
  lr: 1.0e-5
  lr_encoder: 1e-6
  num_epochs: 5
  batch_size: 64
  grad_accum_steps: 8
  patience: 3
  save_dir: experiments/kd/sweep/encoder_lr/lr_1e-6

data_folder: data/
model_folder: model/
