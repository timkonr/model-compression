# Hybrid-LR-Mini-Check (decoder-only 80%, hybrid alpha=0.5) — Phase A -> B Bruecke.
# Kein eigener voller Sweep fuer hybrid: getestet werden nur die beiden Kandidaten-LRs
# der Einzel-Losses dieser Komponente (CE-Gewinner 1e-3, KD-Gewinner 5e-4); Begruendung:
# hybrid = alpha*CE + (1-alpha)*KD interpoliert beide Zielfunktionen, sein Optimum liegt
# plausibel bei einem der beiden Einzeloptima. Der Gewinner (bestes Val-FENSE) wird in
# experiments/kd/ablation/loss/decoder_hybrid/seed_*/config.yaml eingetragen; dieser Lauf
# selbst IST dann der Seed-42-Ablation-Lauf (identische Bedingungen — keine Wiederholung).
# Run: mc-train-kd --config experiments/kd/sweep/decoder_hybrid_lr/lr_1e-3/config.yaml

model: conette
dataset: clotho
seed: 42

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: null
  decoder_pruning_ratio: 0.8
  convnext_3072_threshold: null
  convnext_1536_threshold: null

kd:
  mode: hybrid
  train_components: decoder
  alpha: 0.5
  lr: 1e-3
  lr_encoder: 1.0e-6  # unused (encoder frozen)
  num_epochs: 20
  batch_size: 8
  grad_accum_steps: 64
  patience: 999  # early stopping disabled for clean full-length runs
  warmup_epochs: 2
  save_dir: experiments/kd/sweep/decoder_hybrid_lr/lr_1e-3

data_folder: data/
model_folder: model/
