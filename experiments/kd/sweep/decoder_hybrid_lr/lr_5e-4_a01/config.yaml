# Hybrid-alpha-Mini-Check (decoder-only 80%, hybrid alpha=0.1) — Phase A -> B Bruecke.
# alpha=0.1 = Hinton-konforme niedrige Hard-Target-Gewichtung ("considerably lower weight
# on the second objective"), Gegenpunkt zur naiven Gleichgewichtung alpha=0.5.
# Werte-Skalen der Terme (~CE 4.2 vs KD 0.1-0.5) taeuschen: die gemessenen grad_norms der
# reinen Losses sind ~1:1.2 (ep0: CE 0.122 / KD 0.142, gleiche Init) — alpha=0.5 ist also
# bereits ~gradienten-balanciert, alpha=0.1 ist die KD-dominante Variante (~10:1).
# Noch kleinere alphas konvergieren gegen pure_kd und beantworten die Ablationsfrage
# ("hilft CE-Beimischung?") nicht mehr.
# LR = 5e-4 (pure_kd-Gewinner): bei alpha=0.1 sitzt das Objective gradientenmaessig fast
# am KD-Ende der CE<->KD-Interpolation, also gehoert auch die LR dorthin.
# Gewinner-alpha (bestes Val-FENSE vs. die alpha=0.5-Laeufe) wird in
# experiments/kd/ablation/loss/decoder_hybrid/seed_*/config.yaml eingetragen; dieser Lauf
# selbst IST dann der Seed-42-Ablation-Lauf (identische Bedingungen — keine Wiederholung).
# Run: mc-train-kd --config experiments/kd/sweep/decoder_hybrid_lr/lr_5e-4_a01/config.yaml

model: conette
dataset: clotho
seed: 42

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: null
  decoder_pruning_ratio: 0.8
  convnext_3072_threshold: null
  convnext_1536_threshold: null

kd:
  mode: hybrid
  train_components: decoder
  alpha: 0.1
  lr: 5e-4
  lr_encoder: 1.0e-6  # unused (encoder frozen)
  num_epochs: 20
  batch_size: 8
  grad_accum_steps: 64
  patience: 999  # early stopping disabled for clean full-length runs
  warmup_epochs: 2
  save_dir: experiments/kd/sweep/decoder_hybrid_lr/lr_5e-4_a01

data_folder: data/
model_folder: model/
