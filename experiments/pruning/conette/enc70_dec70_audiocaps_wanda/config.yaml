model: conette
dataset: audiocaps
seed: 42

technique: pruning

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: 0.7
  decoder_pruning_ratio: 0.7
  convnext_3072_threshold: null
  convnext_1536_threshold: null

metrics: [spider, fense, meteor]
inference: true
evaluation: true
save_inference_results: true
data_folder: data/
model_folder: model/
