      convnext_3072_keep_ratio: 0.7

  - model: conette
    dataset: audiocaps
    technique: pruning
    pruning:
      score_mode: sum_l2
      convnext_3072_keep_ratio: 0.5

  - model: conette
    dataset: audiocaps
    technique: pruning
    pruning:
      score_mode: sum_l2
      convnext_3072_keep_ratio: 0.3

  - model: conette
    dataset: audiocaps
    technique: kd

  # ─────────────────────────────────────────────
  # CLAPCAP × Clotho
  # Note: GPT-2 decoder excluded from pruning (6x inference time increase).
  #       GPT-2 excluded from quantization (tied weights issue).
  # ─────────────────────────────────────────────

  - model: clapcap
    dataset: clotho
    technique: none

  - model: clapcap
    dataset: clotho
    technique: quantization

  # Pruning — encoder (HTSAT) only — Random baseline
