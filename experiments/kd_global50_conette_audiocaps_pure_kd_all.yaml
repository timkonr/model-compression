# global_pruning_ratio=0.5, pure KD, all components — AudioCaps training
# Mirror of kd_global50_conette_clotho_pure_kd_all.yaml on AudioCaps.
# AudioCaps ⊂ AudioSet → better domain match for ConvNeXt encoder recovery.
# Run with: mc-train-kd --config experiments/kd_global50_conette_audiocaps_pure_kd_all.yaml

model: conette
dataset: audiocaps
seed: 42

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: 0.5
  decoder_threshold: null
  convnext_3072_threshold: null
  convnext_1536_threshold: null

kd:
  mode: pure_kd
  train_components: all
  alpha: 0.0
  lr: 1.0e-6
  lr_encoder: 1.0e-7
  num_epochs: 25
  batch_size: 4
  grad_accum_steps: 4
  patience: 10
  save_dir: checkpoints/kd_global50_conette_audiocaps_pure_kd_all

data_folder: data/
model_folder: model/
