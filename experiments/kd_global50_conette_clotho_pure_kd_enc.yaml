# Ablation: pure KD loss (Minitron BP #5), encoder-only training
# Key question: does teacher supervision help over CE when only the encoder is updated?
# Run with: mc-train-kd --config experiments/kd_global50_conette_clotho_pure_kd_enc.yaml

model: conette
dataset: clotho
seed: 42

pruning:
  score_mode: wanda
  num_calibration_batches: 128
  global_pruning_ratio: 0.5
  decoder_pruning_ratio: null
  convnext_3072_threshold: null
  convnext_1536_threshold: null

kd:
  mode: pure_kd
  train_components: encoder
  alpha: 0.0
  lr: 1.0e-6
  lr_encoder: 1.0e-7
  num_epochs: 25
  batch_size: 4
  grad_accum_steps: 4
  patience: 10
  save_dir: checkpoints/kd_global50_conette_clotho_pure_kd_enc

data_folder: data/
model_folder: model/
