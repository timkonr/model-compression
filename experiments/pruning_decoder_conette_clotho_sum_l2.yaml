# Decoder pruning (50%, sum_l2) — baseline for wanda comparison
# Run with: mc-run --config experiments/pruning_decoder_conette_clotho_sum_l2.yaml

model: conette
dataset: clotho
seed: 42

technique: pruning

pruning:
  score_mode: sum_l2
  num_calibration_batches: 0
  global_pruning_ratio: null
  decoder_pruning_ratio: 0.7
  convnext_3072_threshold: null
  convnext_1536_threshold: null

metrics: [spider, fense, meteor]
inference: true
evaluation: true
save_inference_results: true
data_folder: data/
model_folder: model/
